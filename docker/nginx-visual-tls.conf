# nginx config for tapps-brain visual dashboard — TLS variant (EPIC-067 STORY-067.4)
#
# Drop-in replacement for nginx-visual.conf that adds HTTPS on port 443.
# Certificates are operator-managed and mounted as volumes (not baked into the image).
#
# Usage:
#   Override the default config in docker-compose.hive.yaml:
#
#     tapps-visual:
#       volumes:
#         - ./nginx-visual-tls.conf:/etc/nginx/conf.d/default.conf
#         - /path/to/cert.pem:/etc/nginx/certs/cert.pem:ro
#         - /path/to/key.pem:/etc/nginx/certs/key.pem:ro
#       ports:
#         - "${TAPPS_VISUAL_PORT:-8088}:443"
#
# See docs/guides/hive-tls.md for certificate generation options.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Certificate paths — mount these as volumes at runtime.
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Modern TLS settings (TLS 1.2+ only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # HSTS — tells browsers to always use HTTPS for this host.
    # Remove or shorten max-age while testing; enable preload only when you own the domain.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Proxy /snapshot → HttpAdapter (tapps-brain-http:8080)
    # resolver 127.0.0.11 is Docker's embedded DNS.
    location /snapshot {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://tapps-brain-http:8080;
        proxy_pass $upstream/snapshot;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
