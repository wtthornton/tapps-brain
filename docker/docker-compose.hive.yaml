services:
  tapps-hive-db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: tapps_hive
      POSTGRES_USER: tapps
      POSTGRES_PASSWORD_FILE: /run/secrets/tapps_hive_password
    volumes:
      - tapps-hive-pgdata:/var/lib/postgresql/data
      - ./init-hive.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tapps -d tapps_hive"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${TAPPS_HIVE_PORT:-5432}:5432"
    secrets:
      - tapps_hive_password
    restart: unless-stopped

  tapps-brain-http:
    build:
      context: ..
      dockerfile: docker/Dockerfile.http
    environment:
      TAPPS_BRAIN_HIVE_DSN: "postgres://tapps:${TAPPS_HIVE_PASSWORD:-tapps}@tapps-hive-db:5432/tapps_hive"
      TAPPS_BRAIN_DATABASE_URL: "${TAPPS_BRAIN_DATABASE_URL:-}"
      TAPPS_BRAIN_AUTO_MIGRATE: "1"
      TAPPS_BRAIN_HTTP_HOST: "0.0.0.0"
      TAPPS_BRAIN_HTTP_PORT: "8080"
      TAPPS_BRAIN_HTTP_AUTH_TOKEN_FILE: /run/secrets/tapps_http_auth_token
      # EPIC-070 STORY-070.6: data plane + /mcp + /admin/* all served by the
      # same FastAPI app on 8080 (previous 8088 admin port collapsed).
      TAPPS_BRAIN_AUTH_TOKEN: "${TAPPS_BRAIN_AUTH_TOKEN:-}"
      TAPPS_BRAIN_ADMIN_TOKEN: "${TAPPS_BRAIN_ADMIN_TOKEN:-}"
      TAPPS_BRAIN_ALLOWED_ORIGINS: "${TAPPS_BRAIN_ALLOWED_ORIGINS:-}"
      TAPPS_BRAIN_STRICT: "1"
    ports:
      # Single port: /mcp, data plane, and /admin/* share one Uvicorn worker
      # (FastMCP session_manager is per-process, so scaling workers is unsafe).
      - "${TAPPS_HTTP_PORT:-8080}:8080"
    secrets:
      - tapps_http_auth_token
    depends_on:
      tapps-hive-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  tapps-visual:
    build:
      context: ..
      dockerfile: docker/Dockerfile.visual
    ports:
      - "${TAPPS_VISUAL_PORT:-8088}:80"
    secrets:
      - tapps_http_auth_token
    depends_on:
      tapps-brain-http:
        condition: service_healthy
    restart: unless-stopped

  tapps-hive-migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    environment:
      TAPPS_BRAIN_HIVE_DSN: "postgres://tapps:${TAPPS_HIVE_PASSWORD:-tapps}@tapps-hive-db:5432/tapps_hive"
      # Private store DSN for wiring HttpAdapter /snapshot endpoint (STORY-065.1).
      # Set this to the private-memory Postgres DSN so the HTTP adapter can inject
      # a live MemoryStore into GET /snapshot at container startup.
      TAPPS_BRAIN_DATABASE_URL: "${TAPPS_BRAIN_DATABASE_URL:-}"
    depends_on:
      tapps-hive-db:
        condition: service_healthy
    command: ["maintenance", "migrate-hive", "--dsn", "postgres://tapps:${TAPPS_HIVE_PASSWORD:-tapps}@tapps-hive-db:5432/tapps_hive"]

volumes:
  tapps-hive-pgdata:

secrets:
  tapps_hive_password:
    file: ./secrets/tapps_hive_password.txt
  tapps_http_auth_token:
    file: ./secrets/tapps_http_auth_token.txt
