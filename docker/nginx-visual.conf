# nginx config for tapps-brain visual dashboard container
# Proxies /snapshot to the HttpAdapter so browser fetch is same-origin (no CORS)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /snapshot → HttpAdapter (tapps-brain-mcp:8080)
    # resolver 127.0.0.11 is Docker's embedded DNS; required for variable proxy_pass
    location /snapshot {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://tapps-brain-mcp:8080;
        proxy_pass $upstream/snapshot;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
