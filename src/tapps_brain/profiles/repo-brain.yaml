profile:
  name: "repo-brain"
  version: "1.0"
  description: "Memory for code repositories and AI coding assistants"

  layers:
    - name: "architectural"
      description: "System decisions, tech stack, infrastructure"
      half_life_days: 180
      decay_model: "exponential"
      decay_exponent: 1.0
      confidence_floor: 0.10
      importance_tags:
        critical: 2.0
        security: 1.5
      promotion_to: null
      demotion_to: "pattern"

    - name: "pattern"
      description: "Coding conventions, API patterns, design patterns"
      half_life_days: 60
      decay_model: "exponential"
      decay_exponent: 1.0
      confidence_floor: 0.10
      importance_tags:
        critical: 1.5
      promotion_to: "architectural"
      promotion_threshold:
        min_access_count: 10
        min_age_days: 30
        min_confidence: 0.7
      demotion_to: "context"

    - name: "procedural"
      description: "Workflows, deployment steps, build commands"
      half_life_days: 30
      decay_model: "exponential"
      decay_exponent: 1.0
      confidence_floor: 0.10
      promotion_to: "pattern"
      promotion_threshold:
        min_access_count: 5
        min_age_days: 14
        min_confidence: 0.6
      demotion_to: "context"

    - name: "context"
      description: "Session-specific facts, current task details"
      half_life_days: 14
      decay_model: "exponential"
      decay_exponent: 1.0
      confidence_floor: 0.05
      promotion_to: "procedural"
      promotion_threshold:
        min_access_count: 3
        min_age_days: 7
        min_confidence: 0.5
      demotion_to: null

  scoring:
    relevance: 0.40
    confidence: 0.30
    recency: 0.15
    frequency: 0.15
    bm25_norm_k: 5.0
    frequency_cap: 20
    source_trust:
      human: 1.0
      system: 0.9
      agent: 0.7
      inferred: 0.5

  source_confidence:
    human: 0.95
    agent: 0.60
    inferred: 0.40
    system: 0.90

  source_ceilings:
    human: 0.95
    agent: 0.85
    inferred: 0.70
    system: 0.95

  gc:
    floor_retention_days: 30
    session_expiry_days: 7
    contradicted_threshold: 0.2
    stale_threshold: 0.3

  recall:
    default_token_budget: 2000
    default_engagement: "high"
    min_score: 0.3
    min_confidence: 0.1

  limits:
    max_entries: 500
    max_key_length: 128
    max_value_length: 4096
    max_tags: 10
