profile:
  name: "repo-brain"
  version: "1.1"
  description: "Memory for code repositories and AI coding assistants"

  # STORY-SC02 (TAP-558): All four tiers use power-law decay with the
  # half-life-anchor exponent β = ln(2) / ln(1 + 1/k) ≈ 3.29 (k = 81/19,
  # FSRS canonical). This preserves R(t = half_life_days) = 0.5 — median
  # retention at the half-life mark is unchanged from the prior exponential
  # configuration. Near-term and tail behavior intentionally diverge: the
  # tail is fatter (matches the Ebbinghaus / Wixted power-law shape).
  # See docs/guides/decay.md for the calibration math.
  layers:
    - name: "architectural"
      description: "System decisions, tech stack, infrastructure"
      half_life_days: 180
      decay_model: "power_law"
      decay_exponent: 3.29
      confidence_floor: 0.10
      importance_tags:
        critical: 2.0
        security: 1.5
      promotion_to: null
      demotion_to: "pattern"

    - name: "pattern"
      description: "Coding conventions, API patterns, design patterns"
      half_life_days: 60
      decay_model: "power_law"
      decay_exponent: 3.29
      confidence_floor: 0.10
      importance_tags:
        critical: 1.5
      promotion_to: "architectural"
      promotion_threshold:
        min_access_count: 10
        min_age_days: 30
        min_confidence: 0.7
      demotion_to: "context"

    - name: "procedural"
      description: "Workflows, deployment steps, build commands"
      half_life_days: 30
      decay_model: "power_law"
      decay_exponent: 3.29
      confidence_floor: 0.10
      promotion_to: "pattern"
      promotion_threshold:
        min_access_count: 5
        min_age_days: 14
        min_confidence: 0.6
      demotion_to: "context"

    - name: "context"
      description: "Session-specific facts, current task details"
      half_life_days: 14
      decay_model: "power_law"
      decay_exponent: 3.29
      confidence_floor: 0.05
      promotion_to: "procedural"
      promotion_threshold:
        min_access_count: 3
        min_age_days: 7
        min_confidence: 0.5
      demotion_to: null

  # Composite retrieval blend (STORY-042.5): relevance + confidence + recency + frequency
  # must sum to ~1.0 (0.95–1.05). Optional graph_centrality / provenance_trust count when > 0.
  # source_trust is applied after the blend (multipliers), not part of that sum.
  scoring:
    relevance: 0.40
    confidence: 0.30
    recency: 0.15
    frequency: 0.15
    frequency_cap: 20
    graph_weight: 0.10
    source_trust:
      human: 1.0
      system: 0.9
      agent: 0.7
      inferred: 0.5

  # Hybrid BM25 + vector RRF (STORY-042.4). Defaults match code; widen recall with e.g.
  # top_k_lexical / top_k_dense or tune rrf_k.
  # hybrid_fusion:
  #   adaptive_fusion: true
  #   top_k_lexical: 20
  #   top_k_dense: 20
  #   rrf_k: 60

  source_confidence:
    human: 0.95
    agent: 0.60
    inferred: 0.40
    system: 0.90

  source_ceilings:
    human: 0.95
    agent: 0.85
    inferred: 0.70
    system: 0.95

  gc:
    floor_retention_days: 30
    session_expiry_days: 7
    contradicted_threshold: 0.2
    stale_threshold: 0.3

  recall:
    default_token_budget: 3000
    default_engagement: "high"
    min_score: 0.3
    min_confidence: 0.1

  limits:
    max_entries: 5000
    max_key_length: 128
    max_value_length: 4096
    max_tags: 10

  # Optional: bump when changing auto-seed facts; included in seed/reseed summaries.
  # seeding:
  #   seed_version: "1.0.0"

  # Knowledge Graph settings (EPIC-075 / ADR-009).
  # evidence_required: when true, edge writes via PostgresKnowledgeGraphStore
  #   reject calls without an evidence_id.  The inferred path (evidence_required=false)
  #   caps edge confidence at 0.4 and is excluded from recall by default.
  kg:
    evidence_required: true
    inferred_confidence_cap: 0.4
    # Edge layer → half-life mapping (days). Used by the FSRS decay helper
    # when computing per-edge stability updates. Mirrors the memory-tier
    # half-lives above so graph facts decay at the same rate as equivalent
    # memory entries.
    edge_layer_half_lives:
      domain: 60
      procedural: 30
      context: 14
