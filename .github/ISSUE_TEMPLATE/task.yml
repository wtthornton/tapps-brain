name: Task
description: Track a development task or chore
type: Task
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Critical path
        - P1 — High
        - P2 — Medium
        - P3 — Low / nice-to-have
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimated Effort
      description: Rough estimate of effort
      placeholder: e.g. 2 hours, 1 day, 1 week
