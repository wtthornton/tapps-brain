# .github/workflows/tapps-quality.yml
# Generated by TappsMCP tapps_init — edit as needed
name: TappsMCP Quality Gate

on:
  pull_request:
    paths:
      - "**.py"
  workflow_dispatch:
    inputs:
      preset:
        description: "Quality preset (standard, strict, framework)"
        required: false
        default: "staging"
        type: choice
        options:
          - standard
          - strict
          - framework

permissions:
  contents: read

concurrency:
  group: tapps-quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install TappsMCP and checkers
        run: |
          # tapps-mcp is an operator-local tool, not published to public PyPI.
          # The install is best-effort — if the binary is unavailable the
          # quality-gate step below no-ops and ruff/mypy are still covered by
          # the CI `lint` job. Swap to a private index / git URL if a hosted
          # copy becomes available.
          pip install tapps-mcp || echo "tapps-mcp not available on this runner; quality gate will skip"
          pip install ruff mypy bandit radon vulture

      - name: Run TappsMCP quality gate
        env:
          TAPPS_MCP_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          if command -v tapps-mcp >/dev/null 2>&1; then
            tapps-mcp validate-changed \
              --preset ${{ inputs.preset || 'staging' }}
          else
            echo "::notice::tapps-mcp binary not installed; skipping gate (see install step)"
          fi

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tapps-quality-report
          path: .tapps-mcp/reports/
          retention-days: 30
          if-no-files-found: ignore
