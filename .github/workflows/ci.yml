name: CI

# Minimal PR gate: lint + unit test only.
#
# Cost discipline (2026-04-27): the previous nightly schedule + cross-platform
# matrix + benchmark / eval jobs were removed.  Re-add a job here only if it
# catches a class of regression that lint + unit-test cannot.  Ad-hoc runs
# stay available via `workflow_dispatch`.

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "openclaw-skill/**"
      - "openclaw-plugin/**"
      - "LICENSE"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "openclaw-skill/**"
      - "openclaw-plugin/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy --strict src/tapps_brain/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: tapps
          POSTGRES_PASSWORD: tapps
          POSTGRES_DB: tapps_brain_dev
        options: >-
          --health-cmd "pg_isready -U tapps -d tapps_brain_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
    env:
      # Single DSN — Hive + Federation inherit. CI connects as the owner role
      # because the tests include schema migrations; TAPPS_BRAIN_ALLOW_PRIVILEGED_ROLE
      # is the documented override for CI/dev. Production uses tapps_runtime.
      TAPPS_BRAIN_DATABASE_URL: postgresql://tapps:tapps@localhost:5432/tapps_brain_dev
      TAPPS_TEST_POSTGRES_DSN: postgresql://tapps:tapps@localhost:5432/tapps_brain_dev
      TAPPS_BRAIN_ALLOW_PRIVILEGED_ROLE: "1"
      HF_DATASETS_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
      - name: Cache HuggingFace models (BAAI/bge-small-en-v1.5)
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-bge-small-en-v1.5-${{ runner.os }}
          restore-keys: hf-models-bge-small-en-v1.5-
      - run: uv sync --group dev --python 3.12
      - name: Pre-download sentence-transformers model
        env:
          HF_DATASETS_OFFLINE: "0"
          TRANSFORMERS_OFFLINE: "0"
          HF_HUB_OFFLINE: "0"
        run: uv run python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('BAAI/bge-small-en-v1.5')"
      - name: Apply schema migrations
        run: uv run python scripts/apply_all_migrations.py
      # Unit tests only — integration/compat/benchmarks excluded; they have
      # known pre-existing failures (tenant isolation, openapi snapshot drift,
      # compat parity) tracked separately. Reintroduce once they're green.
      - run: uv run pytest tests/unit/ -v --tb=short -m "not benchmark"

# Removed in the 2026-04-27 cost-discipline pass:
#   - eval-golden, benchmark-smoke (nightly cron via `schedule:`)
#   - test-cross-platform (macos-latest + windows-latest matrix; Mac/Windows
#     runners cost ~10x ubuntu minutes on private repos)
# Run them locally when needed:
#   uv run python scripts/run_eval_golden.py --output eval-report.json
#   uv run python scripts/run_benchmark.py locomo --dataset tests/benchmarks/fixtures/locomo_fixture.json
#   uv run pytest tests/unit/ -v --tb=short -m "not benchmark"  # cross-platform smoke
