name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --extra dev
      - run: uv run python scripts/check_openclaw_docs_consistency.py
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy --strict src/tapps_brain/

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --extra dev --python ${{ matrix.python-version }}
      - run: uv run pytest tests/ -v --tb=short --cov=tapps_brain --cov-report=term-missing --cov-fail-under=95

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv build
      - run: uv venv .venv-build
      - run: uv pip install dist/*.whl --python .venv-build
      - run: .venv-build/bin/python -c "from tapps_brain import MemoryStore, __version__; print(f'tapps-brain v{__version__}')"

  # Full production gate (packaging, version tests, ruff/mypy, plugin build/test).
  # SKIP_FULL_PYTEST=1 avoids duplicating the full matrix pytest run.
  release-ready:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: openclaw-plugin/package-lock.json
      - run: SKIP_FULL_PYTEST=1 bash scripts/release-ready.sh
