name: CI

on:
  schedule:
    # Weekly cross-platform test: Sundays at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "openclaw-skill/**"
      - "LICENSE"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "openclaw-skill/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run python scripts/check_openclaw_docs_consistency.py
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy --strict src/tapps_brain/

  openapi-contract:
    # TAP-508: regenerate the OpenAPI snapshot from the running adapter and
    # fail if it has drifted from the checked-in copy under docs/contracts/.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --extra http
      - run: uv run python scripts/snapshot_openapi.py
      - name: Fail on OpenAPI drift
        run: |
          if ! git diff --exit-code -- docs/contracts/openapi.json; then
            echo "::error::OpenAPI spec has drifted from docs/contracts/openapi.json."
            echo "::error::Run 'uv run python scripts/snapshot_openapi.py' locally and commit the result."
            exit 1
          fi

  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: tapps
          POSTGRES_PASSWORD: tapps
          POSTGRES_DB: tapps_dev
        options: >-
          --health-cmd "pg_isready -U tapps -d tapps_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
    env:
      TAPPS_BRAIN_DATABASE_URL: postgresql://tapps:tapps@localhost:5432/tapps_dev
      TAPPS_TEST_POSTGRES_DSN: postgresql://tapps:tapps@localhost:5432/tapps_dev
      # Hive tests also use the same single-node Postgres in CI
      TAPPS_BRAIN_HIVE_DSN: postgresql://tapps:tapps@localhost:5432/tapps_dev
      # TAP-512: CI Postgres runs as the superuser 'tapps', which bypasses
      # RLS.  Acknowledge that by setting the override; production deploys
      # connect as the non-owner tapps_runtime role and must NOT set this.
      TAPPS_BRAIN_ALLOW_PRIVILEGED_ROLE: "1"
      # Keep sentence-transformers/HuggingFace models offline after first cache hit
      HF_DATASETS_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - name: Cache HuggingFace models (BAAI/bge-small-en-v1.5)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-bge-small-en-v1.5-${{ runner.os }}
          restore-keys: hf-models-bge-small-en-v1.5-
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Pre-download sentence-transformers model (populates cache on miss)
        env:
          HF_DATASETS_OFFLINE: "0"
          TRANSFORMERS_OFFLINE: "0"
          HF_HUB_OFFLINE: "0"
        run: uv run python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('BAAI/bge-small-en-v1.5')"
      - name: Apply schema migrations
        run: uv run python scripts/apply_all_migrations.py
      # Coverage threshold is 88% (lowered from 95% in EPIC-071; EPIC-066.4 will restore to 95%
      # by adding Postgres-mode integration test coverage for hive/relay/federation services).
      - run: uv run pytest tests/ -v --tb=short --cov=tapps_brain --cov-report=term-missing --cov-fail-under=88

  # Weekly cross-platform sanity check (macOS + Windows).
  # Runs on schedule and can be triggered manually; not required for PRs.
  test-cross-platform:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - run: uv run pytest tests/ -v --tb=short --cov=tapps_brain --cov-report=term-missing --cov-fail-under=88

  # Retrieval regression gate: runs the lexical golden eval suite on every PR
  # and uploads the JSON report as a build artifact for dashboard tracking.
  eval-golden:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run python scripts/run_eval_golden.py --output eval-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: eval-report.json

  # STORY-070.14: compatibility test suite — embedded AgentBrain API vs live Postgres.
  # Runs on every PR/push alongside the main test suite to catch regressions.
  compat:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg17
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: tapps
          POSTGRES_PASSWORD: tapps
          POSTGRES_DB: tapps_compat
        options: >-
          --health-cmd "pg_isready -U tapps -d tapps_compat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 10s
    env:
      TAPPS_BRAIN_DATABASE_URL: postgresql://tapps:tapps@localhost:5432/tapps_compat
      TAPPS_BRAIN_HIVE_DSN: postgresql://tapps:tapps@localhost:5432/tapps_compat
      # TAP-511: fail the build if requires_postgres tests would silently skip
      # because TAPPS_BRAIN_DATABASE_URL is unset.
      TAPPS_BRAIN_TESTS_STRICT: "1"
      # TAP-512: see test job — CI runs as superuser, opt out of role assertion.
      TAPPS_BRAIN_ALLOW_PRIVILEGED_ROLE: "1"
      HF_DATASETS_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - name: Cache HuggingFace models (BAAI/bge-small-en-v1.5)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-bge-small-en-v1.5-${{ runner.os }}
          restore-keys: hf-models-bge-small-en-v1.5-
      - run: uv sync --group dev
      - name: Pre-download sentence-transformers model
        env:
          HF_DATASETS_OFFLINE: "0"
          TRANSFORMERS_OFFLINE: "0"
          HF_HUB_OFFLINE: "0"
        run: uv run python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('BAAI/bge-small-en-v1.5')"
      - name: Apply schema migrations
        run: uv run python scripts/apply_all_migrations.py
      - name: Run embedded-API compatibility suite
        run: uv run pytest tests/compat/ -v --tb=short
      - name: Assert no compat tests were skipped
        run: |
          uv run pytest tests/compat/ --collect-only -q -m requires_postgres > /tmp/collected.txt
          uv run pytest tests/compat/ --tb=no -q -m requires_postgres 2>&1 | tee /tmp/result.txt
          if grep -E "[0-9]+ skipped" /tmp/result.txt; then
            echo "::error::compat suite reported skipped tests under STRICT — DSN may be unreachable"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - run: uv build
      - run: uv venv .venv-build
      - run: uv pip install dist/*.whl --python .venv-build
      - run: .venv-build/bin/python -c "from tapps_brain import MemoryStore, __version__; print(f'tapps-brain v{__version__}')"

  # Production gate: packaging, version tests, plugin build/test.
  # Lint and full pytest are handled by dedicated jobs above;
  # SKIP_LINT=1 and SKIP_FULL_PYTEST=1 avoid duplicating that work.
  release-ready:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: openclaw-plugin/package-lock.json
      - run: SKIP_FULL_PYTEST=1 SKIP_LINT=1 bash scripts/release-ready.sh
