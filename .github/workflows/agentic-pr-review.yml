# .github/workflows/agentic-pr-review.yml
# Generated by TappsMCP tapps_init — agentic workflow (technical preview)
# Requires GitHub Agentic Workflows to be enabled for the repository.
name: Agentic PR Quality Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          # tapps-mcp is an operator-local tool, not on public PyPI (see
          # tapps-quality.yml comment). Install is best-effort; when
          # unavailable the analysis step below no-ops.
          pip install tapps-mcp || echo "tapps-mcp not available on this runner; review will skip"
          pip install ruff mypy bandit radon vulture

      - name: Run quality analysis on changed files
        env:
          TAPPS_MCP_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          if command -v tapps-mcp >/dev/null 2>&1; then
            tapps-mcp validate-changed --preset strict
          else
            echo "::notice::tapps-mcp binary not installed; skipping agentic review (see install step)"
          fi
