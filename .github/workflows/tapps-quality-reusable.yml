# .github/workflows/tapps-quality-reusable.yml
# Generated by TappsMCP tapps_init — reusable workflow module
# Other workflows can call this via workflow_call.
name: TappsMCP Quality (Reusable)

on:
  workflow_call:
    inputs:
      preset:
        description: "Quality preset"
        required: false
        default: "standard"
        type: string
      python-version:
        description: "Python version"
        required: false
        default: "3.12"
        type: string

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install TappsMCP and checkers
        run: |
          pip install tapps-mcp
          pip install ruff mypy bandit radon vulture

      - name: Run quality gate
        env:
          TAPPS_MCP_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          tapps-mcp validate-changed \
            --preset ${{ inputs.preset }}
