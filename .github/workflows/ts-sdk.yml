name: TypeScript SDK

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/ts-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/ts-sdk.yml"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Build + unit tests (always runs)
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & unit test — ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - sdk
          - langgraph
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # Contract tests (runs only when tapps-brain is available)
  # ---------------------------------------------------------------------------
  contract-tests:
    name: Contract tests — TS SDK ↔ Python SDK parity
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only run on push to main or when explicitly triggered; skip for PRs
    # to avoid requiring a running brain in every PR environment.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: packages/sdk

    services:
      tapps-db:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: tapps
          POSTGRES_PASSWORD: tapps
          POSTGRES_DB: tapps_brain
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U tapps"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install Node dependencies
        run: npm install

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        run: uv sync --group dev
        working-directory: ${{ github.workspace }}

      - name: Apply migrations & start brain HTTP server
        env:
          TAPPS_BRAIN_DATABASE_URL: postgresql://tapps:tapps@localhost:5433/tapps_brain
          TAPPS_BRAIN_AUTO_MIGRATE: "1"
          TAPPS_BRAIN_PROJECT: contract-test-ts
          TAPPS_BRAIN_HTTP_PORT: "8080"
        run: |
          uv run tapps-brain-http &
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/health && break
            sleep 1
          done
        working-directory: ${{ github.workspace }}

      - name: Build SDK
        run: npm run build

      - name: Run contract tests
        env:
          TAPPS_BRAIN_CONTRACT: "1"
          TAPPS_BRAIN_URL: "http://localhost:8080"
          TAPPS_BRAIN_PROJECT: "contract-test-ts"
          TAPPS_BRAIN_DATABASE_URL: postgresql://tapps:tapps@localhost:5433/tapps_brain
        run: npm run test:contract

  # ---------------------------------------------------------------------------
  # Publish to npm (runs only on GitHub release)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to npm — ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: npm-publish
    strategy:
      matrix:
        package:
          - sdk
          - langgraph
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish ${{ matrix.package }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
