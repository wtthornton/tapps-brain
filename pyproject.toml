[build-system]
requires = ["hatchling>=1.28,<2"]
build-backend = "hatchling.build"

[project]
name = "tapps-brain"
version = "1.1.0"
description = "Persistent cross-session memory system for AI coding assistants"
license = "MIT"
requires-python = ">=3.12"
readme = "README.md"
authors = [
    { name = "TappsMCP Contributors" },
]
keywords = ["memory", "ai", "coding-assistant", "bm25", "knowledge-store", "sqlite"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.12.5,<3",
    "structlog>=25.5.0,<26",
    "pyyaml>=6.0.3,<7",
]

[project.scripts]
tapps-brain = "tapps_brain.cli:app"
tapps-brain-mcp = "tapps_brain.mcp_server:main"

[project.optional-dependencies]
cli = [
    "typer>=0.12.3,<1",
]
mcp = [
    "mcp>=1.2.0,<2",
]
vector = [
    "faiss-cpu>=1.13.2,<2",
    "sentence-transformers>=5.2.3,<6",
    "numpy>=2.4.2,<3",
]
reranker = [
    "cohere>=5.0,<6",
]
all = [
    "tapps-brain[cli,mcp,vector,reranker]",
]
dev = [
    "pytest>=8.0,<9",
    "pytest-asyncio>=0.25,<1",
    "pytest-cov>=6.0,<7",
    "pytest-benchmark>=5.0,<6",
    "mypy>=1.14,<2",
    "ruff>=0.9,<1",
    "mcp>=1.2.0,<2",
    "typer>=0.12.3,<1",
]

[tool.hatch.build.targets.sdist]
include = ["src/tapps_brain/"]

[tool.hatch.build.targets.wheel]
packages = ["src/tapps_brain"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
markers = [
    "benchmark: performance benchmarks (deselect with '-m not benchmark')",
]
filterwarnings = [
    "ignore:unclosed database:ResourceWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = [
    "faiss",
    "faiss.*",
    "numpy",
    "numpy.*",
    "sentence_transformers",
    "sentence_transformers.*",
    "cohere",
    "cohere.*",
    "yaml",
    "mcp",
    "mcp.*",
]
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "ANN",  # flake8-annotations
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
    "PLR",  # pylint refactor
]
ignore = [
    "ANN101",  # missing self annotation (removed in newer ruff)
    "ANN102",  # missing cls annotation (removed in newer ruff)
    "PLR0913", # too many arguments (inherent to dispatch functions)
    "PLR0912", # too many branches
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "PLR"]
